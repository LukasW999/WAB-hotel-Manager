services:
  db:
    image: postgres:16-alpine
    container_name: hotel-manager-db
    environment:
      POSTGRES_DB: wab
      POSTGRES_USER: wab
      POSTGRES_PASSWORD: wab
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wab -d wab" ]
      interval: 5s
      timeout: 5s
      retries: 20
